name: Deploy explorer + prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build explorer (site root)
        working-directory: explorer
        env:
          PAGES_BASE: /whizdom-ai-interview/
        run: |
          npm ci
          npm run build

      - name: Build prototype (under /prototype/)
        working-directory: prototype
        run: |
          npm ci
          npx tsc -b
          npx vite build --base=/whizdom-ai-interview/prototype/

      - name: Assemble site
        run: |
          mkdir -p _site/prototype
          cp -r explorer/dist/* _site/
          cp -r prototype/dist/* _site/prototype/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
